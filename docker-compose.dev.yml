version: '3.8'

services:
  # Backend API Service (Development)
  alphavision-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - DATA_AUTO_UPDATE=${DATA_AUTO_UPDATE:-true}
      - DATA_UPDATE_HOUR=${DATA_UPDATE_HOUR:-6}
      - DATA_UPDATER_DAYS=${DATA_UPDATER_DAYS:-10}
      - INTERNAL_RELOAD_TOKEN=${INTERNAL_RELOAD_TOKEN:-}
      - HF_HOME=${HF_HOME:-/app/data/hf_home}
      - TZ=${TZ:-Europe/Athens}
      - XAI_API_URL=${XAI_API_URL:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_API_PATH=${XAI_API_PATH:-/analyze}
      - XAI_API_TIMEOUT=${XAI_API_TIMEOUT:-30}
      - XAI_USE_MOCK=${XAI_USE_MOCK:-true}
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - alphavision-network

  # Frontend Dashboard Service (Development)
  alphavision-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_GITHUB_REPO=${VITE_GITHUB_REPO:-https://github.com/GeorgeMakridis/alpha-vision-insights}
      - VITE_CONTACT_EMAIL=${VITE_CONTACT_EMAIL:-legal@example.com}
    depends_on:
      - alphavision-backend
    restart: unless-stopped
    networks:
      - alphavision-network

networks:
  alphavision-network:
    driver: bridge 