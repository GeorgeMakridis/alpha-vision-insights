services:
  # Backend API: uvicorn first; DeepVaR/data updater run in post_start.sh (background).
  alphavision-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - BLNN_VAR_API_URL=${BLNN_VAR_API_URL:-}
      - DEEP_VAR_API_URL=${DEEP_VAR_API_URL:-}
      - VAR_API_TIMEOUT=${VAR_API_TIMEOUT:-5.0}
      - VAR_ROLLING_WINDOW_DAYS=${VAR_ROLLING_WINDOW_DAYS:-252}
      - DEEPVAR_EPOCHS=${DEEPVAR_EPOCHS:-10}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - DATA_AUTO_UPDATE=${DATA_AUTO_UPDATE:-true}
      - DATA_UPDATE_HOUR=${DATA_UPDATE_HOUR:-6}
      - DATA_REFRESH_SENTIMENT=${DATA_REFRESH_SENTIMENT:-false}
      # Wider backfill for news/prices on startup (e.g. 365). Default 10.
      - DATA_UPDATER_DAYS=${DATA_UPDATER_DAYS:-10}
      # After post_start updates disk, backend calls POST /api/admin/reload-data (localhost only).
      - INTERNAL_RELOAD_TOKEN=${INTERNAL_RELOAD_TOKEN:-}
      - SKIP_POST_START_TASKS=${SKIP_POST_START_TASKS:-}
      # Hugging Face: optional token + cache dir (persists under ./backend/data if HF_HOME is under /app/data)
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=${HF_HOME:-/app/data/hf_home}
      # Yahoo price fetch: retries/backoff when fc.yahoo.com is flaky (see README troubleshooting)
      - YFINANCE_DOWNLOAD_RETRIES=${YFINANCE_DOWNLOAD_RETRIES:-5}
      - YFINANCE_RETRY_BACKOFF_BASE_SEC=${YFINANCE_RETRY_BACKOFF_BASE_SEC:-3}
      - YFINANCE_RETRY_BACKOFF_MAX_SEC=${YFINANCE_RETRY_BACKOFF_MAX_SEC:-60}
      - YFINANCE_DOWNLOAD_THREADS=${YFINANCE_DOWNLOAD_THREADS:-false}
      - TZ=${TZ:-Europe/Athens}
      - XAI_API_URL=${XAI_API_URL:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_API_PATH=${XAI_API_PATH:-/analyze}
      - XAI_API_TIMEOUT=${XAI_API_TIMEOUT:-30}
      - XAI_USE_MOCK=${XAI_USE_MOCK:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Uvicorn starts immediately; post_start (data + DeepVaR) runs in background.
      start_period: 120s
    networks:
      - alphavision-network

  # Frontend Dashboard Service
  alphavision-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
        VITE_GITHUB_REPO: ${VITE_GITHUB_REPO:-https://github.com/GeorgeMakridis/alpha-vision-insights}
        VITE_CONTACT_EMAIL: ${VITE_CONTACT_EMAIL:-legal@example.com}
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8001
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      alphavision-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alphavision-network

networks:
  alphavision-network:
    driver: bridge 